{% extends 'base.html'%}
{% block content %}
<section class="card">
  <div class="row">
    <div class="column">
      <h1>{{ menu_item.name }}</h1>
      <p class="text-muted">{{ menu_item.description }}</p>
      <p class="menu-price">Price: {{ menu_item.price }}</p>
      <a href="{% url 'menu' %}" class="button secondary">Back to menu</a>
    </div>
  </div>
</section>
{% endblock %}
